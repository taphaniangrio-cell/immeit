<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 - Page non trouvée | IMMEIT</title>
<meta name="robots" content="noindex,nofollow">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111927;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .c{max-width:480px}
  h1{font-size:6rem;font-weight:800;background:linear-gradient(135deg,#C99A3E,#e8b84a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
  h2{font-size:1.3rem;margin:16px 0 8px;color:#f1f5f9}
  p{color:#8899b0;margin-bottom:24px;line-height:1.6}
  a{display:inline-block;background:linear-gradient(135deg,#C99A3E,#a07a2e);color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600;transition:.3s}
  a:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(201,154,62,.45)}
</style>
</head>
<body>
<div class="c">
  <h1>404</h1>
  <h2>Page non trouvée</h2>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a href="/">Retour à l'accueil</a>
</div>
</body>
</html>
