<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMEIT - Administration</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f1f5f9; color: #1e293b; min-height: 100vh;
  }
  :root {
    --gold: #C99A3E;
    --blue: #1F538C;
    --blue-dark: #0f172a;
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }

  /* LOGIN */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: linear-gradient(135deg, var(--blue-dark) 0%, #1a365d 100%);
  }
  .login-card {
    background: white; padding: 48px 40px; border-radius: 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
    text-align: center;
  }
  .login-card .logo-icon {
    width: 64px; height: 64px; background: linear-gradient(135deg, var(--gold), #d4a843);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 28px; color: white;
  }
  .login-card h1 { font-size: 24px; margin-bottom: 4px; color: var(--blue-dark); }
  .login-card p { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
  .login-card input {
    width: 100%; padding: 14px 18px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 15px; margin-bottom: 16px;
    transition: border-color .2s; outline: none;
  }
  .login-card input:focus { border-color: var(--gold); }
  .login-card button {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blue), #2a6cbf);
    color: white; border: none; border-radius: 10px; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .login-card button:hover { opacity: .9; }

  /* APP LAYOUT */
  .app { display: none; }
  .app.active { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px; background: var(--blue-dark); color: white;
    display: flex; flex-direction: column; position: fixed;
    top: 0; left: 0; bottom: 0; z-index: 10;
  }
  .sidebar-brand {
    padding: 24px 20px 20px; border-bottom: 1px solid #1e293b;
  }
  .sidebar-brand h2 {
    font-size: 20px; color: var(--gold);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-brand h2 i { font-size: 22px; }
  .sidebar-stats {
    padding: 16px 20px; border-bottom: 1px solid #1e293b;
  }
  .sidebar-stats .stat {
    display: flex; justify-content: space-between; padding: 6px 0;
    font-size: 13px; color: #94a3b8;
  }
  .sidebar-stats .stat span:last-child { font-weight: 600; color: var(--gold); }
  .sidebar-nav {
    padding: 12px; flex: 1; overflow-y: auto;
  }
  .sidebar-nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; color: #94a3b8; text-decoration: none;
    border-radius: 8px; margin-bottom: 2px; font-size: 14px;
    cursor: pointer; transition: all .15s;
  }
  .sidebar-nav a:hover { background: #1e293b; color: white; }
  .sidebar-nav a.active {
    background: rgba(201, 154, 62, 0.15); color: var(--gold);
    font-weight: 500;
  }
  .sidebar-nav a .count {
    margin-left: auto; background: #1e293b; padding: 1px 8px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
  }
  .sidebar-nav a.active .count { background: rgba(201, 154, 62, 0.2); color: var(--gold); }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid #1e293b; }
  .sidebar-footer button {
    width: 100%; padding: 10px; background: transparent;
    border: 1px solid #334155; color: #94a3b8; border-radius: 8px;
    cursor: pointer; font-size: 14px; display: flex;
    align-items: center; gap: 8px; justify-content: center;
    transition: all .15s;
  }
  .sidebar-footer button:hover { background: #1e293b; color: #ef4444; border-color: #ef4444; }

  /* MAIN */
  .main {
    margin-left: 260px; flex: 1; padding: 24px 32px; max-width: 100%;
  }
  .main-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .main-header h1 { font-size: 22px; color: var(--blue-dark); }
  .main-header .badge {
    background: var(--gold); color: var(--blue-dark); padding: 6px 14px;
    border-radius: 20px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }

  /* MESSAGE LIST */
  .msg-list {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .msg-item {
    display: flex; align-items: stretch; cursor: pointer;
    border-bottom: 1px solid #f1f5f9; transition: background .15s;
  }
  .msg-item:hover { background: #fafbfc; }
  .msg-item.unread { background: #f8faff; }
  .msg-item.unread:hover { background: #f0f4ff; }
  .msg-item:last-child { border-bottom: none; }

  .msg-indicator {
    width: 40px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg-indicator i { font-size: 14px; color: #94a3b8; }
  .msg-item.unread .msg-indicator i { color: var(--blue); }

  .msg-body {
    flex: 1; padding: 16px 12px 16px 0; min-width: 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .msg-row1 {
    display: flex; align-items: center; gap: 12px;
  }
  .msg-name {
    font-weight: 600; font-size: 14px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 140px; max-width: 200px;
  }
  .msg-item.unread .msg-name { font-weight: 700; }
  .msg-subject {
    font-size: 14px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .msg-date {
    font-size: 12px; color: var(--muted); white-space: nowrap;
    flex-shrink: 0;
  }
  .msg-row2 {
    display: flex; align-items: center; gap: 8px;
  }
  .msg-preview {
    font-size: 13px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .msg-tags { display: flex; gap: 4px; flex-shrink: 0; }
  .msg-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .msg-tag-sent { background: #dcfce7; color: #166534; }
  .msg-tag-pending { background: #fef9c3; color: #854d0e; }
  .msg-tag-failed { background: #fee2e2; color: #991b1b; }
  .msg-tag-failed_permanent { background: #fecaca; color: #7f1d1d; }
  .msg-tag-unread {
    background: #dbeafe; color: #1e40af;
  }

  .msg-actions {
    display: flex; align-items: center; gap: 2px; padding-right: 12px;
    opacity: 0; transition: opacity .15s; flex-shrink: 0;
  }
  .msg-item:hover .msg-actions { opacity: 1; }
  .msg-actions button {
    width: 32px; height: 32px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 13px; background: transparent;
    color: var(--muted); transition: all .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .msg-actions button:hover { background: #f1f5f9; }
  .msg-actions .act-read:hover { color: var(--blue); }
  .msg-actions .act-retry:hover { color: var(--gold); }
  .msg-actions .act-delete:hover { color: #ef4444; background: #fee2e2; }

  /* MODAL - Professional email reader */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px); z-index: 100;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 16px; max-width: 680px;
    width: 100%; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: modalIn .25s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .modal-email-header {
    padding: 28px 32px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-email-subject {
    font-size: 20px; font-weight: 700; color: var(--blue-dark);
    margin-bottom: 20px; line-height: 1.3;
  }
  .modal-email-sender {
    display: flex; align-items: center; gap: 12px;
  }
  .modal-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #d4a843);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .modal-sender-info { flex: 1; min-width: 0; }
  .modal-sender-name {
    font-size: 15px; font-weight: 600; color: var(--text);
  }
  .modal-sender-email {
    font-size: 13px; color: var(--muted);
  }
  .modal-sender-meta {
    text-align: right; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .modal-sender-date {
    font-size: 12px; color: var(--muted); white-space: nowrap;
  }
  .modal-sender-status {
    font-size: 12px;
  }

  .modal-email-body {
    padding: 24px 32px;
  }
  .modal-email-message {
    font-size: 15px; line-height: 1.8; color: #334155;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .modal-email-divider {
    height: 1px; background: var(--border); margin: 24px 0;
  }
  .modal-email-details {
    display: grid; grid-template-columns: auto 1fr; gap: 6px 16px;
    font-size: 13px;
  }
  .modal-email-details dt {
    color: var(--muted); font-weight: 500;
  }
  .modal-email-details dd {
    color: var(--text);
  }
  .modal-email-details dd.error-text {
    color: #ef4444;
  }

  .modal-email-footer {
    padding: 20px 32px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  .modal-email-footer button {
    padding: 10px 20px; border: none; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all .15s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: var(--blue); color: white;
  }
  .btn-primary:hover { background: #1a4575; }
  .btn-ghost {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: #f8fafc; color: var(--text); }
  .btn-danger {
    background: transparent; color: #ef4444; border: 1px solid #fecaca;
  }
  .btn-danger:hover { background: #fef2f2; }

  .modal-close-btn {
    position: absolute; top: 20px; right: 20px;
    width: 36px; height: 36px; border: none; border-radius: 50%;
    background: #f1f5f9; cursor: pointer; font-size: 18px;
    color: var(--muted); display: flex; align-items: center;
    justify-content: center; transition: all .15s;
  }
  .modal-close-btn:hover { background: #e2e8f0; color: var(--text); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 64px 24px; color: var(--muted);
  }
  .empty-state .empty-icon {
    width: 80px; height: 80px; margin: 0 auto 20px;
    background: #f1f5f9; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #94a3b8;
  }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 14px 24px;
    border-radius: 10px; color: white; font-size: 14px; font-weight: 500;
    z-index: 200; animation: slideUp .3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast-success { background: #166534; }
  .toast-error { background: #991b1b; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { position: relative; width: 100%; }
    .main { margin-left: 0; padding: 16px; }
    .msg-row1 { flex-wrap: wrap; }
    .msg-name { min-width: 100px; }
    .msg-date { width: auto; }
    .msg-actions { opacity: 1; }
    .modal { margin: 16px; max-height: 90vh; }
    .modal-email-header,
    .modal-email-body,
    .modal-email-footer { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="logo-icon"><i class="fas fa-envelope"></i></div>
    <h1>Administration</h1>
    <p>Connectez-vous pour gérer les messages</p>
    <input type="password" id="tokenInput" placeholder="Token d'administration">
    <button onclick="login()">Connexion</button>
    <p id="loginError" style="color:#ef4444;font-size:13px;margin-top:12px;display:none;"></p>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2><i class="fas fa-envelope"></i> IMMEIT</h2>
    </div>
    <div class="sidebar-stats" id="stats">
      <div class="stat"><span>Total</span><span id="statTotal">0</span></div>
      <div class="stat"><span>Non lus</span><span id="statUnread">0</span></div>
      <div class="stat"><span>Envoyés</span><span id="statSent">0</span></div>
      <div class="stat"><span>En attente</span><span id="statPending">0</span></div>
      <div class="stat"><span>Échoués</span><span id="statFailed">0</span></div>
    </div>
    <nav class="sidebar-nav">
      <a class="active" onclick="setFilter('all')" data-filter="all"><i class="fas fa-inbox"></i> Tous</a>
      <a onclick="setFilter('unread')" data-filter="unread"><i class="fas fa-envelope"></i> Non lus</a>
      <a onclick="setFilter('sent')" data-filter="sent"><i class="fas fa-check-circle"></i> Envoyés</a>
      <a onclick="setFilter('pending')" data-filter="pending"><i class="fas fa-clock"></i> En attente</a>
      <a onclick="setFilter('failed')" data-filter="failed"><i class="fas fa-exclamation-triangle"></i> Échoués</a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
  </aside>
  <main class="main">
    <div class="main-header">
      <h1 id="pageTitle">Tous les messages</h1>
      <span class="badge"><i class="fas fa-sync-alt"></i> Auto</span>
    </div>
    <div class="msg-list" id="msgList">
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-spinner fa-spin"></i></div>
        <h3>Chargement...</h3>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" style="position:relative">
    <button class="modal-close-btn" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const API = '/api/admin';
let token = '';
let currentFilter = 'all';
let messages = [];

function login() {
  const input = document.getElementById('tokenInput');
  const err = document.getElementById('loginError');
  token = input.value.trim();
  if (!token) { err.textContent = 'Veuillez entrer le token'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  localStorage.setItem('immeit_admin_token', token);
  loadApp();
}

function logout() {
  token = '';
  localStorage.removeItem('immeit_admin_token');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
}

function checkAuth() {
  const saved = localStorage.getItem('immeit_admin_token');
  if (saved) { token = saved; loadApp(); }
}

async function api(path, options = {}) {
  const res = await fetch(API + path, {
    headers: { ...options.headers, 'Authorization': 'Bearer ' + token },
    ...options
  });
  if (res.status === 401) { logout(); throw new Error('Non autorisé'); }
  return res;
}

async function loadApp() {
  try {
    await api('/messages?limit=1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    loadMessages();
    setInterval(loadMessages, 30000);
  } catch {
    document.getElementById('loginError').textContent = 'Token invalide';
    document.getElementById('loginError').style.display = 'block';
  }
}

async function loadMessages() {
  if (!token) return;
  try {
    const res = await api('/messages');
    messages = await res.json();
    render();
  } catch { /* silent */ }
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-filter="${filter}"]`)?.classList.add('active');
  const titles = { all: 'Tous les messages', unread: 'Non lus', sent: 'Envoyés', pending: 'En attente', failed: 'Échoués' };
  document.getElementById('pageTitle').textContent = titles[filter] || 'Messages';
  render();
}

function filteredMessages() {
  if (currentFilter === 'all') return messages;
  if (currentFilter === 'unread') return messages.filter(m => !m.read_at);
  return messages.filter(m => m.status === currentFilter);
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'À l\'instant';
  if (diff < 3600000) return `Il y a ${Math.floor(diff/60000)} min`;
  if (diff < 86400000) return `Il y a ${Math.floor(diff/3600000)}h`;
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function statusTag(status) {
  const labels = { sent: 'Envoyé', pending: 'En attente', failed: 'Échec', failed_permanent: 'Abandonné' };
  return `<span class="msg-tag msg-tag-${status}"><i class="fas fa-${status === 'sent' ? 'check' : status === 'pending' ? 'clock' : 'times'}"></i> ${labels[status] || status}</span>`;
}

function render() {
  const filtered = filteredMessages();
  const container = document.getElementById('msgList');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"><i class="fas fa-inbox"></i></div><h3>Aucun message</h3><p>Aucun message ne correspond à ce filtre.</p></div>';
    updateStats();
    return;
  }

  container.innerHTML = filtered.map(m => `
    <div class="msg-item ${m.read_at ? '' : 'unread'}" onclick="viewMessage(${m.id})">
      <div class="msg-indicator">
        ${m.read_at ? '<i class="fas fa-envelope-open"></i>' : '<i class="fas fa-envelope"></i>'}
      </div>
      <div class="msg-body">
        <div class="msg-row1">
          <span class="msg-name">${escapeHtml(m.name)}</span>
          <span class="msg-subject">${escapeHtml(m.subject)}</span>
          <span class="msg-date">${formatDate(m.created_at)}</span>
        </div>
        <div class="msg-row2">
          <span class="msg-preview">${escapeHtml(m.message)}</span>
          <div class="msg-tags">
            ${!m.read_at ? '<span class="msg-tag msg-tag-unread">Nouveau</span>' : ''}
            ${statusTag(m.status)}
          </div>
        </div>
      </div>
      <div class="msg-actions" onclick="event.stopPropagation()">
        ${!m.read_at ? `<button class="act-read" onclick="markRead(${m.id})" title="Marquer lu"><i class="fas fa-check"></i></button>` : ''}
        ${m.status === 'failed' ? `<button class="act-retry" onclick="retrySend(${m.id})" title="Réessayer"><i class="fas fa-redo"></i></button>` : ''}
        <button class="act-delete" onclick="deleteMsg(${m.id})" title="Supprimer"><i class="fas fa-trash"></i></button>
      </div>
    </div>
  `).join('');

  updateStats();
}

function updateStats() {
  document.getElementById('statTotal').textContent = messages.length;
  document.getElementById('statUnread').textContent = messages.filter(m => !m.read_at).length;
  document.getElementById('statSent').textContent = messages.filter(m => m.status === 'sent').length;
  document.getElementById('statPending').textContent = messages.filter(m => m.status === 'pending' || m.status === 'failed').length;
  document.getElementById('statFailed').textContent = messages.filter(m => m.status === 'failed_permanent').length;
}

async function viewMessage(id) {
  try {
    const res = await api(`/messages/${id}`);
    const m = await res.json();
    const initials = (m.name || '?').charAt(0).toUpperCase();
    document.getElementById('modalContent').innerHTML = `
      <div class="modal-email-header">
        <div class="modal-email-subject">${escapeHtml(m.subject)}</div>
        <div class="modal-email-sender">
          <div class="modal-avatar">${initials}</div>
          <div class="modal-sender-info">
            <div class="modal-sender-name">${escapeHtml(m.name)}</div>
            <div class="modal-sender-email"><a href="mailto:${escapeHtml(m.email)}" style="color:#1F538C;text-decoration:none">${escapeHtml(m.email)}</a></div>
          </div>
          <div class="modal-sender-meta">
            <span class="modal-sender-date">${formatDate(m.created_at)}</span>
            <span class="modal-sender-status">${statusTag(m.status)}</span>
          </div>
        </div>
      </div>
      <div class="modal-email-body">
        <div class="modal-email-message">${escapeHtml(m.message)}</div>
        <div class="modal-email-divider"></div>
        <dl class="modal-email-details">
          <dt>Date</dt><dd>${formatDate(m.created_at)}</dd>
          ${m.sent_at ? `<dt>Envoi</dt><dd>${formatDate(m.sent_at)}</dd>` : ''}
          ${m.status === 'failed_permanent' && m.error_message ? `<dt>Erreur</dt><dd class="error-text">${escapeHtml(m.error_message)}</dd>` : ''}
          ${m.status === 'failed' && m.error_message ? `<dt>Erreur</dt><dd class="error-text">${escapeHtml(m.error_message)}</dd>` : ''}
        </dl>
      </div>
      <div class="modal-email-footer">
        ${!m.read_at ? `<button class="btn-primary" onclick="markRead(${m.id})"><i class="fas fa-check"></i> Marquer comme lu</button>` : ''}
        ${m.status === 'failed' ? `<button class="btn-primary" onclick="retrySend(${m.id})"><i class="fas fa-redo"></i> Réessayer</button>` : ''}
        <button class="btn-danger" onclick="deleteMsg(${m.id})"><i class="fas fa-trash"></i> Supprimer</button>
        <button class="btn-ghost" onclick="closeModal()" style="margin-left:auto">Fermer</button>
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('active');
  } catch { showToast('Erreur lors du chargement', 'error'); }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

async function markRead(id) {
  try {
    await api(`/messages/${id}/read`, { method: 'PUT' });
    showToast('Marqué comme lu', 'success');
    loadMessages();
  } catch { showToast('Erreur', 'error'); }
}

async function deleteMsg(id) {
  if (!confirm('Supprimer ce message ?')) return;
  try {
    await api(`/messages/${id}`, { method: 'DELETE' });
    showToast('Message supprimé', 'success');
    loadMessages();
    closeModal();
  } catch { showToast('Erreur lors de la suppression', 'error'); }
}

async function retrySend(id) {
  try {
    const res = await api(`/messages/${id}/retry`, { method: 'POST' });
    if (res.ok) { showToast('Envoi réussi', 'success'); }
    else { const d = await res.json(); showToast('Échec: ' + (d.error || 'erreur'), 'error'); }
    loadMessages();
  } catch { showToast('Erreur lors du renvoi', 'error'); }
}

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

document.addEventListener('DOMContentLoaded', checkAuth);
document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
</body>
</html>
