<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#111927">
  <title>Page introuvable — IMMEIT</title>
  <link rel="icon" type="image/jpeg" href="logo-immeit.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Poppins,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:#111927;color:#fff}
    .error-code{font-size:clamp(4rem,15vw,8rem);font-weight:900;color:#C99A3E;line-height:1;margin-bottom:1rem}
    .error-title{font-size:clamp(1.2rem,4vw,2rem);margin-bottom:1rem;font-weight:600}
    .error-text{color:#94a3b8;margin-bottom:2rem;max-width:400px;line-height:1.6}
    .btn-home{display:inline-block;padding:0.875rem 2rem;background:#C99A3E;color:#111927;text-decoration:none;border-radius:8px;font-weight:600;transition:opacity 0.2s}
    .btn-home:hover{opacity:0.85}
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-text">La page que vous recherchez n'existe pas ou a été déplacée.</p>
  <a href="/" class="btn-home">Retour à l'accueil</a>
</body>
</html>
