    <g stroke="url(#g)" stroke-width="2.5">
      <line x1="30" y1="6" x2="30" y2="12"/>
      <line x1="30" y1="48" x2="30" y2="54"/>
      <line x1="6" y1="30" x2="12" y2="30"/>
      <line x1="48" y1="30" x2="54" y2="30"/>
      <line x1="13" y1="13" x2="17" y2="17"/>
      <line x1="43" y1="43" x2="47" y2="47"/>
      <line x1="13" y1="47" x2="17" y2="43"/>
      <line x1="43" y1="17" x2="47" y2="13"/>
    </g>
  </g>
  <!-- IMMEIT text -->
  <text x="75" y="42" font-family="Poppins,Arial,sans-serif" font-size="28" font-weight="800" fill="#f1f5f9">IMMEIT</text>
  <!-- Tagline -->
  <text x="75" y="66" font-family="Poppins,Arial,sans-serif" font-size="8" font-weight="400" fill="#8899b0">
