<!-- ============================================================
     CORRECTIF COMPTEURS KPI — IntersectionObserver fallback
     Remplacer/compléter le script JS existant des compteurs
     ============================================================ -->
<script>
// Compteurs KPI — version robuste avec fallback iOS Safari
document.addEventListener('DOMContentLoaded', function() {
  const counters = document.querySelectorAll('[data-target]');

  // Valeurs cibles (ajouter data-target="XX" sur chaque élément counter dans le HTML)
  // Exemple HTML : <span class="counter" data-target="95" data-suffix="%">0</span>

  if (!('IntersectionObserver' in window)) {
    // Fallback : afficher directement les valeurs finales
    counters.forEach(counter => {
      const target = parseInt(counter.getAttribute('data-target'), 10);
      const suffix = counter.getAttribute('data-suffix') || '';
      counter.textContent = target + suffix;
    });
    return;
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const counter = entry.target;
          const target = parseInt(counter.getAttribute('data-target'), 10);
          const suffix = counter.getAttribute('data-suffix') || '';
          const duration = 1500;
          const step = target / (duration / 16);
          let current = 0;

          const timer = setInterval(() => {
            current += step;
            if (current >= target) {
              counter.textContent = target + suffix;
              clearInterval(timer);
            } else {
              counter.textContent = Math.floor(current) + suffix;
            }
          }, 16);

          observer.unobserve(counter);
        }
      });
    },
    {
      threshold: 0.1,          // Déclenche dès 10% visible (au lieu de 50%)
      rootMargin: '0px 0px -50px 0px'  // Déclenchement légèrement avant la fin du viewport
    }
  );

  counters.forEach(counter => {
    observer.observe(counter);
  });
});
</script>
