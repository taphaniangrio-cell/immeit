<!-- 3. FAQ Page (section FAQ de l'accueil) -->

      }
    },
    {
      "@type": "Question",
      "name": "IMMEIT intervient-il uniquement au Sénégal ?",

    {
      "@type": "Question",
      "name": "IMMEIT propose-t-il des contrats de maintenance ?",
      "acceptedAnswer": {
